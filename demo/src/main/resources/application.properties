# Configurações do Datasource
# Primary: use DATABASE_URL if available (Railway sets this automatically)
# Fallback: construct URL from individual PG* variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pinboard}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Configurações do Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# Configurações gerais
server.port=${PORT:8080}
spring.application.name=Pinboard

# Configurações de recursos estáticos
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.web.resources.chain.strategy.content.enabled=true

# Desabilitar devtools em produo
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
